services:
  - type: keyvalue
    name: stat-visualizer-queue
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: stat-visualizer-web
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: corepack enable && pnpm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_SECRET_SLUG
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stat-visualizer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stat-visualizer-queue
          property: connectionString

  - type: worker
    name: stat-visualizer-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: APP_SECRET_SLUG
        fromService:
          type: web
          name: stat-visualizer-web
          envVarKey: APP_SECRET_SLUG
      - key: BACKTEST_COMMAND
        value: rust_backtester --trader {file} --dataset round5 --products full --artifact-mode none
      - key: BACKTEST_WORKDIR
        value: /app
      - key: DATABASE_URL
        fromDatabase:
          name: stat-visualizer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stat-visualizer-queue
          property: connectionString

databases:
  - name: stat-visualizer-db
    plan: basic-1gb
